<svg viewBox="0 0 860 600" width="860" height="600" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="dt-a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b90a0"/></marker>
<marker id="dt-b" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6c9fff"/></marker>
</defs>
<g font-family="system-ui,sans-serif">

<!-- Title -->
<text x="430" y="24" fill="#e1e4eb" font-size="15" text-anchor="middle" font-weight="600">Decoder-Only Transformer Architecture</text>
<text x="430" y="40" fill="#8b90a0" font-size="10" text-anchor="middle">(GPT, Claude, Llama, Gemini)</text>

<!-- ═══ LEFT PANEL: High-Level Pipeline ═══ -->

<!-- Input Tokens -->
<rect x="65" y="60" width="190" height="30" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="160" y="80" fill="#e1e4eb" font-size="12" text-anchor="middle">Input Tokens</text>
<line x1="160" y1="90" x2="160" y2="106" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Input Embedding -->
<rect x="65" y="112" width="190" height="30" rx="4" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="160" y="132" fill="#6c9fff" font-size="12" text-anchor="middle" font-weight="600">Input Embedding</text>
<line x1="160" y1="142" x2="160" y2="156" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Positional Encoding (+) -->
<circle cx="160" cy="172" r="14" fill="#1a1d27" stroke="#8b90a0" stroke-width="1.5"/>
<text x="160" y="177" fill="#e1e4eb" font-size="16" text-anchor="middle" font-weight="600">+</text>
<text x="190" y="166" fill="#8b90a0" font-size="9" text-anchor="start">Positional</text>
<text x="190" y="177" fill="#8b90a0" font-size="9" text-anchor="start">Encoding</text>
<line x1="160" y1="186" x2="160" y2="204" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Transformer Block ×N -->
<rect x="50" y="210" width="220" height="50" rx="6" fill="#1a1d27" stroke="#6c9fff" stroke-width="2" stroke-dasharray="6,4"/>
<text x="160" y="234" fill="#6c9fff" font-size="13" text-anchor="middle" font-weight="600">Transformer Block</text>
<text x="160" y="252" fill="#8b90a0" font-size="10" text-anchor="middle">&#215; N layers</text>
<line x1="160" y1="260" x2="160" y2="278" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Layer Norm (final) -->
<rect x="65" y="284" width="190" height="28" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="160" y="303" fill="#e1e4eb" font-size="11" text-anchor="middle">Layer Norm</text>
<line x1="160" y1="312" x2="160" y2="328" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Linear (Unembedding) -->
<rect x="65" y="334" width="190" height="28" rx="4" fill="#1a1d27" stroke="#fbbf24" stroke-width="1.5"/>
<text x="160" y="353" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">Linear (Unembedding)</text>
<line x1="160" y1="362" x2="160" y2="378" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Softmax -->
<rect x="65" y="384" width="190" height="28" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="160" y="403" fill="#e1e4eb" font-size="11" text-anchor="middle">Softmax</text>
<line x1="160" y1="412" x2="160" y2="428" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Output Probabilities -->
<rect x="50" y="434" width="220" height="32" rx="4" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="160" y="455" fill="#4ade80" font-size="12" text-anchor="middle" font-weight="600">Output Probabilities</text>

<!-- ═══ CONNECTOR ═══ -->
<path d="M270,235 L400,235" fill="none" stroke="#6c9fff" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#dt-b)"/>
<text x="335" y="228" fill="#6c9fff" font-size="9" text-anchor="middle" font-style="italic">detail</text>

<!-- ═══ RIGHT PANEL: Transformer Block Detail ═══ -->
<rect x="405" y="56" width="430" height="530" rx="8" fill="none" stroke="#6c9fff" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="620" y="80" fill="#6c9fff" font-size="13" text-anchor="middle" font-weight="600">Inside One Transformer Block</text>

<!-- Input arrow -->
<text x="620" y="100" fill="#8b90a0" font-size="10" text-anchor="middle">input from previous layer</text>
<line x1="620" y1="106" x2="620" y2="124" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Layer Norm 1 -->
<rect x="530" y="130" width="180" height="28" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="620" y="149" fill="#e1e4eb" font-size="11" text-anchor="middle">Layer Norm</text>
<line x1="620" y1="158" x2="620" y2="178" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Multi-Head Attention (stacked cards for multiple heads) -->
<rect x="547" y="184" width="170" height="72" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1" opacity="0.25"/>
<rect x="541" y="189" width="170" height="72" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1" opacity="0.5"/>
<rect x="535" y="194" width="170" height="72" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="620" y="218" fill="#6c9fff" font-size="12" text-anchor="middle" font-weight="600">Masked Multi-Head</text>
<text x="620" y="234" fill="#6c9fff" font-size="12" text-anchor="middle" font-weight="600">Self-Attention</text>
<text x="620" y="254" fill="#8b90a0" font-size="9" text-anchor="middle">Q, K, V projections &#215; h heads</text>
<line x1="620" y1="266" x2="620" y2="288" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Residual Add 1 (+) -->
<circle cx="620" cy="304" r="14" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="620" y="309" fill="#4ade80" font-size="16" text-anchor="middle" font-weight="600">+</text>

<!-- Skip connection 1 (right side bypass) -->
<path d="M620,118 L738,118 L738,304 L634,304" fill="none" stroke="#6c9fff" stroke-width="1" opacity="0.5" marker-end="url(#dt-b)"/>
<text x="748" y="214" fill="#6c9fff" font-size="8" opacity="0.6">residual</text>

<line x1="620" y1="318" x2="620" y2="340" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Layer Norm 2 -->
<rect x="530" y="346" width="180" height="28" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="620" y="365" fill="#e1e4eb" font-size="11" text-anchor="middle">Layer Norm</text>
<line x1="620" y1="374" x2="620" y2="394" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Feed-Forward Network -->
<rect x="520" y="400" width="200" height="48" rx="5" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="620" y="424" fill="#e1e4eb" font-size="12" text-anchor="middle" font-weight="600">Feed-Forward Network</text>
<text x="620" y="440" fill="#8b90a0" font-size="9" text-anchor="middle">expand &#8594; activate &#8594; project</text>
<line x1="620" y1="448" x2="620" y2="470" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Residual Add 2 (+) -->
<circle cx="620" cy="486" r="14" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="620" y="491" fill="#4ade80" font-size="16" text-anchor="middle" font-weight="600">+</text>

<!-- Skip connection 2 (right side bypass, wider to avoid overlap) -->
<path d="M620,324 L766,324 L766,486 L634,486" fill="none" stroke="#6c9fff" stroke-width="1" opacity="0.5" marker-end="url(#dt-b)"/>
<text x="776" y="408" fill="#6c9fff" font-size="8" opacity="0.6">residual</text>

<line x1="620" y1="500" x2="620" y2="524" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>

<!-- Output -->
<text x="620" y="542" fill="#8b90a0" font-size="10" text-anchor="middle">output to next layer</text>

</g>
</svg>
