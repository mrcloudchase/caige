<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" width="560" height="440" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#8b90a0" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-r" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#8b90a0" stroke-width="1.2"/>
    </marker>
  </defs>

  <rect width="560" height="440" rx="8" fill="#1a1d27"/>

  <text x="280" y="28" text-anchor="middle" fill="#e1e4eb" font-size="14" font-weight="bold">Human-in-the-Loop Escalation Tiers</text>

  <!-- AI Guardrail Decision -->
  <rect x="185" y="44" width="190" height="36" rx="6" fill="#2a2d37" stroke="#e1e4eb" stroke-width="2"/>
  <text x="280" y="67" text-anchor="middle" fill="#e1e4eb" font-size="12" font-weight="bold">AI Guardrail Decision</text>

  <!-- Arrow down -->
  <line x1="280" y1="80" x2="280" y2="96" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#arrow-d)"/>

  <!-- Confidence Check Diamond -->
  <polygon points="280,98 350,130 280,162 210,130" fill="none" stroke="#6c9fff" stroke-width="1.5"/>
  <text x="280" y="127" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">Confidence</text>
  <text x="280" y="140" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">Check</text>

  <!-- High confidence path (right) → Auto-approve -->
  <line x1="350" y1="130" x2="440" y2="130" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#arrow-r)"/>
  <text x="390" y="122" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">HIGH</text>
  <rect x="442" y="112" width="100" height="36" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.2"/>
  <text x="492" y="135" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Auto-Approve</text>

  <!-- Low confidence path (down) → Escalation Queue -->
  <line x1="280" y1="162" x2="280" y2="184" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#arrow-d)"/>
  <text x="263" y="177" text-anchor="end" fill="#fbbf24" font-size="9" font-weight="bold">LOW</text>

  <!-- Escalation Queue Box -->
  <rect x="40" y="186" width="480" height="155" rx="6" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="280" y="206" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">Escalation Queue (Severity Tiers)</text>

  <!-- Tier 1: Critical -->
  <rect x="60" y="216" width="130" height="50" rx="4" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.2"/>
  <text x="125" y="236" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">Critical</text>
  <text x="125" y="252" text-anchor="middle" fill="#8b90a0" font-size="8">Data breach, attack</text>
  <text x="125" y="262" text-anchor="middle" fill="#8b90a0" font-size="8">SLA: &lt;15 min</text>

  <!-- Tier 2: High -->
  <rect x="210" y="216" width="130" height="50" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="275" y="236" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">High</text>
  <text x="275" y="252" text-anchor="middle" fill="#8b90a0" font-size="8">Policy violation</text>
  <text x="275" y="262" text-anchor="middle" fill="#8b90a0" font-size="8">SLA: &lt;1 hour</text>

  <!-- Tier 3: Standard -->
  <rect x="360" y="216" width="140" height="50" rx="4" fill="#6c9fff" opacity="0.12" stroke="#6c9fff" stroke-width="1.2"/>
  <text x="430" y="236" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">Standard</text>
  <text x="430" y="252" text-anchor="middle" fill="#8b90a0" font-size="8">Gray area, uncertain</text>
  <text x="430" y="262" text-anchor="middle" fill="#8b90a0" font-size="8">SLA: &lt;4 hours</text>

  <!-- Reviewer row -->
  <rect x="60" y="280" width="440" height="30" rx="4" fill="none" stroke="#8b90a0" stroke-width="1"/>
  <text x="280" y="300" text-anchor="middle" fill="#8b90a0" font-size="10">Human Reviewers (with rotation, fatigue monitoring, QA sampling)</text>

  <!-- No reviewer fallback note -->
  <text x="280" y="330" text-anchor="middle" fill="#8b90a0" font-size="9" font-style="italic">If no reviewer available → conservative default (block high-risk, allow low-risk)</text>

  <!-- Arrow down from queue -->
  <line x1="280" y1="340" x2="280" y2="358" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#arrow-d)"/>

  <!-- Feedback Loop -->
  <rect x="130" y="360" width="300" height="36" rx="6" fill="#4ade80" opacity="0.1" stroke="#4ade80" stroke-width="1.2"/>
  <text x="280" y="376" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Feedback Loop</text>
  <text x="280" y="390" text-anchor="middle" fill="#8b90a0" font-size="9">Human decisions retrain classifiers, reducing future escalations</text>

  <!-- Feedback arrow back up (curved) -->
  <path d="M130,378 L30,378 L30,130 L210,130" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-r)"/>
  <text x="30" y="255" fill="#4ade80" font-size="8" transform="rotate(-90, 30, 255)" text-anchor="middle">Improves automation</text>

  <!-- Legend -->
  <text x="280" y="430" text-anchor="middle" fill="#8b90a0" font-size="8">Escalation tiers route by severity · SLAs prevent queue stagnation · Reviewer decisions improve guardrails over time</text>
</svg>