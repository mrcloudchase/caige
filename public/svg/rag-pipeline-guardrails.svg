<svg viewBox="0 0 600 520" width="600" height="520" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="rpg-a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b90a0"/></marker>
<marker id="rpg-b" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#6c9fff"/></marker>
</defs>
<g font-family="system-ui,sans-serif">

<!-- Title -->
<text x="300" y="20" fill="#e1e4eb" font-size="14" text-anchor="middle" font-weight="600">RAG Pipeline with Guardrail Checkpoints</text>

<!-- ═══ Left branch: Document ingestion ═══ -->
<text x="150" y="50" fill="#e1e4eb" font-size="11" text-anchor="middle" font-weight="600">Document Ingestion</text>

<!-- Documents -->
<rect x="75" y="60" width="150" height="32" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="150" y="81" fill="#6c9fff" font-size="11" text-anchor="middle">Documents</text>

<line x1="150" y1="92" x2="150" y2="108" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Chunking -->
<rect x="75" y="114" width="150" height="32" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="150" y="135" fill="#6c9fff" font-size="11" text-anchor="middle">Chunk Documents</text>

<line x1="150" y1="146" x2="150" y2="162" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Embedding -->
<rect x="75" y="168" width="150" height="32" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="150" y="189" fill="#6c9fff" font-size="11" text-anchor="middle">Embed Chunks</text>

<line x1="150" y1="200" x2="150" y2="216" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Vector DB -->
<rect x="75" y="222" width="150" height="40" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="150" y="240" fill="#6c9fff" font-size="11" text-anchor="middle" font-weight="600">Vector Database</text>
<text x="150" y="254" fill="#8b90a0" font-size="9" text-anchor="middle">stored embeddings</text>

<!-- ═══ Right branch: Query path ═══ -->
<text x="450" y="50" fill="#e1e4eb" font-size="11" text-anchor="middle" font-weight="600">Query Path</text>

<!-- User Query -->
<rect x="375" y="60" width="150" height="32" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="450" y="81" fill="#6c9fff" font-size="11" text-anchor="middle">User Query</text>

<line x1="450" y1="92" x2="450" y2="108" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Query Embedding -->
<rect x="375" y="114" width="150" height="32" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="450" y="135" fill="#6c9fff" font-size="11" text-anchor="middle">Embed Query</text>

<!-- Arrow from query embedding to vector DB (similarity search) -->
<line x1="375" y1="138" x2="225" y2="238" stroke="#6c9fff" stroke-width="1.5" marker-end="url(#rpg-b)"/>
<text x="280" y="175" fill="#6c9fff" font-size="9" text-anchor="middle" transform="rotate(-22, 280, 175)">similarity search</text>

<!-- ═══ Merged path: retrieval + guardrails ═══ -->

<!-- Arrow from vector DB down -->
<line x1="150" y1="262" x2="150" y2="278" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Guardrail 1: Access Control -->
<rect x="60" y="284" width="180" height="28" rx="5" fill="#1a1d27" stroke="#fbbf24" stroke-width="1.5"/>
<text x="150" y="303" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="600">GUARDRAIL: Access Control</text>
<text x="258" y="303" fill="#8b90a0" font-size="9" text-anchor="start">filter by user permissions</text>

<line x1="150" y1="312" x2="150" y2="328" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Guardrail 2: Relevance Threshold -->
<rect x="48" y="334" width="204" height="28" rx="5" fill="#1a1d27" stroke="#fbbf24" stroke-width="1.5"/>
<text x="150" y="353" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="600">GUARDRAIL: Relevance Threshold</text>
<text x="270" y="353" fill="#8b90a0" font-size="9" text-anchor="start">drop low-similarity chunks</text>

<line x1="150" y1="362" x2="150" y2="378" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Guardrail 3: Injection Scan -->
<rect x="56" y="384" width="188" height="28" rx="5" fill="#1a1d27" stroke="#fbbf24" stroke-width="1.5"/>
<text x="150" y="403" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="600">GUARDRAIL: Injection Scan</text>
<text x="262" y="403" fill="#8b90a0" font-size="9" text-anchor="start">detect embedded instructions</text>

<line x1="150" y1="412" x2="150" y2="428" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- LLM Context -->
<rect x="55" y="434" width="370" height="32" rx="5" fill="#1a1d27" stroke="#8b90a0" stroke-width="1.5"/>
<text x="240" y="455" fill="#e1e4eb" font-size="11" text-anchor="middle">LLM Context: System Prompt + Chunks + Query</text>

<line x1="240" y1="466" x2="240" y2="482" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rpg-a)"/>

<!-- Guardrail 4: Groundedness Check on output -->
<rect x="138" y="488" width="204" height="28" rx="5" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="240" y="507" fill="#4ade80" font-size="10" text-anchor="middle" font-weight="600">GUARDRAIL: Groundedness Check</text>
<text x="360" y="507" fill="#8b90a0" font-size="9" text-anchor="start">verify output vs sources</text>

</g>
</svg>