<svg viewBox="0 0 620 380" width="620" height="380" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="rh-a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b90a0"/></marker>
</defs>
<g font-family="system-ui,sans-serif">

<!-- Title -->
<text x="310" y="22" fill="#e1e4eb" font-size="14" text-anchor="middle" font-weight="600">RLHF Training Pipeline</text>

<!-- ═══ Step 1: Generate Candidates ═══ -->
<circle cx="42" cy="66" r="14" fill="#1a1d27" stroke="#f4a752" stroke-width="1.5"/>
<text x="42" y="71" fill="#f4a752" font-size="13" text-anchor="middle" font-weight="700">1</text>

<rect x="68" y="46" width="214" height="40" rx="5" fill="#1a1d27" stroke="#f4a752" stroke-width="1.5"/>
<text x="175" y="63" fill="#f4a752" font-size="11" text-anchor="middle" font-weight="600">Generate Candidates</text>
<text x="175" y="78" fill="#8b90a0" font-size="9" text-anchor="middle">Model produces multiple responses</text>

<!-- Fan-out arrows to response boxes -->
<line x1="282" y1="58" x2="312" y2="50" stroke="#8b90a0" stroke-width="1" marker-end="url(#rh-a)"/>
<line x1="282" y1="66" x2="312" y2="66" stroke="#8b90a0" stroke-width="1" marker-end="url(#rh-a)"/>
<line x1="282" y1="74" x2="312" y2="82" stroke="#8b90a0" stroke-width="1" marker-end="url(#rh-a)"/>

<rect x="320" y="40" width="105" height="18" rx="3" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1"/>
<text x="372" y="53" fill="#8b90a0" font-size="9" text-anchor="middle">Response A</text>

<rect x="320" y="60" width="105" height="18" rx="3" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="372" y="73" fill="#4ade80" font-size="9" text-anchor="middle">Response B (safe)</text>

<rect x="320" y="80" width="105" height="18" rx="3" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1"/>
<text x="372" y="93" fill="#8b90a0" font-size="9" text-anchor="middle">Response C</text>

<text x="440" y="62" fill="#8b90a0" font-size="9" font-style="italic">e.g. &quot;How do I</text>
<text x="440" y="74" fill="#8b90a0" font-size="9" font-style="italic">pick a lock?&quot;</text>

<!-- Arrow 1 to 2 -->
<line x1="175" y1="86" x2="175" y2="122" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rh-a)"/>

<!-- ═══ Step 2: Human Ranking ═══ -->
<circle cx="42" cy="148" r="14" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="42" y="153" fill="#6c9fff" font-size="13" text-anchor="middle" font-weight="700">2</text>

<rect x="68" y="128" width="214" height="40" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="175" y="145" fill="#6c9fff" font-size="11" text-anchor="middle" font-weight="600">Human Ranking</text>
<text x="175" y="160" fill="#8b90a0" font-size="9" text-anchor="middle">Raters evaluate by safety, helpfulness, accuracy</text>

<text x="320" y="145" fill="#8b90a0" font-size="10">Rank: </text>
<text x="358" y="145" fill="#4ade80" font-size="10" font-weight="600">B</text>
<text x="372" y="145" fill="#8b90a0" font-size="10"> &gt; A &gt; C</text>
<text x="320" y="162" fill="#8b90a0" font-size="9" font-style="italic">(safe refusal ranked highest)</text>

<!-- Arrow 2 to 3 -->
<line x1="175" y1="168" x2="175" y2="204" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rh-a)"/>

<!-- ═══ Step 3: Train Reward Model ═══ -->
<circle cx="42" cy="230" r="14" fill="#1a1d27" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="42" y="235" fill="#c4b5fd" font-size="13" text-anchor="middle" font-weight="700">3</text>

<rect x="68" y="210" width="214" height="40" rx="5" fill="#1a1d27" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="175" y="227" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="600">Train Reward Model</text>
<text x="175" y="242" fill="#8b90a0" font-size="9" text-anchor="middle">Separate NN learns human preferences</text>

<text x="320" y="225" fill="#8b90a0" font-size="9">Trained on thousands of rankings.</text>
<text x="320" y="239" fill="#8b90a0" font-size="9">Can score any response without</text>
<text x="320" y="253" fill="#8b90a0" font-size="9">a human in the loop.</text>

<!-- Arrow 3 to 4 -->
<line x1="175" y1="250" x2="175" y2="286" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#rh-a)"/>

<!-- ═══ Step 4: Optimize via PPO ═══ -->
<circle cx="42" cy="312" r="14" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="42" y="317" fill="#4ade80" font-size="13" text-anchor="middle" font-weight="700">4</text>

<rect x="68" y="292" width="214" height="40" rx="5" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="175" y="309" fill="#4ade80" font-size="11" text-anchor="middle" font-weight="600">Optimize LLM via PPO</text>
<text x="175" y="324" fill="#8b90a0" font-size="9" text-anchor="middle">Adjust weights to maximize reward scores</text>

<text x="320" y="307" fill="#8b90a0" font-size="9">Constrained update: model improves</text>
<text x="320" y="321" fill="#8b90a0" font-size="9">but cannot deviate too far from its</text>
<text x="320" y="335" fill="#8b90a0" font-size="9">instruction-tuned behavior.</text>

<!-- Result -->
<line x1="175" y1="332" x2="175" y2="356" stroke="#4ade80" stroke-width="1.5" marker-end="url(#rh-a)"/>
<text x="175" y="372" fill="#4ade80" font-size="11" text-anchor="middle" font-weight="600">Result: model that prefers safe, helpful responses</text>

</g>
</svg>
