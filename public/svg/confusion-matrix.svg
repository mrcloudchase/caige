<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="520" height="380" font-family="system-ui, sans-serif">
  <rect width="520" height="380" rx="8" fill="#1a1d27"/>

  <text x="260" y="28" text-anchor="middle" fill="#e1e4eb" font-size="14" font-weight="bold">Guardrail Detection: Confusion Matrix</text>

  <!-- Axis labels -->
  <text x="310" y="56" text-anchor="middle" fill="#e1e4eb" font-size="11" font-weight="bold">Actual</text>
  <text x="240" y="76" text-anchor="middle" fill="#ef4444" font-size="10">Harmful</text>
  <text x="380" y="76" text-anchor="middle" fill="#4ade80" font-size="10">Benign</text>

  <text x="120" y="130" text-anchor="middle" fill="#e1e4eb" font-size="11" font-weight="bold" transform="rotate(-90, 70, 155)">Guardrail Decision</text>
  <text x="130" y="128" text-anchor="end" fill="#ef4444" font-size="10">Flagged</text>
  <text x="130" y="228" text-anchor="end" fill="#4ade80" font-size="10">Passed</text>

  <!-- True Positive (top-left) -->
  <rect x="170" y="86" width="140" height="80" rx="4" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">True Positive</text>
  <text x="240" y="138" text-anchor="middle" fill="#8b90a0" font-size="9">Harmful input correctly</text>
  <text x="240" y="152" text-anchor="middle" fill="#8b90a0" font-size="9">flagged by guardrail</text>

  <!-- False Positive (top-right) -->
  <rect x="310" y="86" width="140" height="80" rx="4" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="380" y="118" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">False Positive</text>
  <text x="380" y="138" text-anchor="middle" fill="#8b90a0" font-size="9">Benign input wrongly</text>
  <text x="380" y="152" text-anchor="middle" fill="#8b90a0" font-size="9">blocked (user friction)</text>

  <!-- False Negative (bottom-left) -->
  <rect x="170" y="166" width="140" height="80" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="240" y="198" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">False Negative</text>
  <text x="240" y="218" text-anchor="middle" fill="#8b90a0" font-size="9">Harmful input missed</text>
  <text x="240" y="232" text-anchor="middle" fill="#8b90a0" font-size="9">by guardrail (safety gap)</text>

  <!-- True Negative (bottom-right) -->
  <rect x="310" y="166" width="140" height="80" rx="4" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1.5"/>
  <text x="380" y="198" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">True Negative</text>
  <text x="380" y="218" text-anchor="middle" fill="#8b90a0" font-size="9">Benign input correctly</text>
  <text x="380" y="232" text-anchor="middle" fill="#8b90a0" font-size="9">allowed through</text>

  <!-- Metric formulas -->
  <rect x="40" y="270" width="210" height="44" rx="4" fill="#6c9fff" opacity="0.1" stroke="#6c9fff" stroke-width="1"/>
  <text x="145" y="288" text-anchor="middle" fill="#6c9fff" font-size="11" font-weight="bold">Precision = TP / (TP + FP)</text>
  <text x="145" y="304" text-anchor="middle" fill="#8b90a0" font-size="9">"When we flag, are we right?"</text>

  <rect x="270" y="270" width="210" height="44" rx="4" fill="#6c9fff" opacity="0.1" stroke="#6c9fff" stroke-width="1"/>
  <text x="375" y="288" text-anchor="middle" fill="#6c9fff" font-size="11" font-weight="bold">Recall = TP / (TP + FN)</text>
  <text x="375" y="304" text-anchor="middle" fill="#8b90a0" font-size="9">"Do we catch all threats?"</text>

  <!-- Threshold tradeoff note -->
  <rect x="100" y="328" width="320" height="36" rx="4" fill="#2a2d37" stroke="none"/>
  <text x="260" y="345" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Threshold Tradeoff</text>
  <text x="260" y="358" text-anchor="middle" fill="#8b90a0" font-size="9">Lower threshold → more flags → higher recall, lower precision (and vice versa)</text>
</svg>