<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ar-d" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#8b90a0" stroke-width="1.2"/>
    </marker>
    <marker id="ar-r" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7" fill="none" stroke="#8b90a0" stroke-width="1.2"/>
    </marker>
  </defs>

  <rect width="560" height="360" rx="8" fill="#1a1d27"/>

  <text x="280" y="28" text-anchor="middle" fill="#e1e4eb" font-size="14" font-weight="bold">PII Detection and Handling Pipeline</text>

  <!-- Input -->
  <rect x="195" y="44" width="170" height="32" rx="6" fill="#2a2d37" stroke="#e1e4eb" stroke-width="2"/>
  <text x="280" y="65" text-anchor="middle" fill="#e1e4eb" font-size="12" font-weight="bold">User Input / Model Output</text>

  <!-- Arrow -->
  <line x1="280" y1="76" x2="280" y2="96" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#ar-d)"/>

  <!-- Detection Stage -->
  <rect x="50" y="98" width="460" height="72" rx="6" fill="none" stroke="#6c9fff" stroke-width="1.5"/>
  <text x="280" y="116" text-anchor="middle" fill="#6c9fff" font-size="12" font-weight="bold">Detection (parallel)</text>

  <!-- Three detection methods -->
  <rect x="70" y="124" width="120" height="36" rx="4" fill="#6c9fff" opacity="0.1" stroke="#6c9fff" stroke-width="1"/>
  <text x="130" y="140" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">Regex</text>
  <text x="130" y="153" text-anchor="middle" fill="#8b90a0" font-size="8">SSN, email, phone, CC</text>

  <rect x="210" y="124" width="140" height="36" rx="4" fill="#6c9fff" opacity="0.1" stroke="#6c9fff" stroke-width="1"/>
  <text x="280" y="140" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">NER Model</text>
  <text x="280" y="153" text-anchor="middle" fill="#8b90a0" font-size="8">Names, addresses, orgs</text>

  <rect x="370" y="124" width="120" height="36" rx="4" fill="#6c9fff" opacity="0.1" stroke="#6c9fff" stroke-width="1"/>
  <text x="430" y="140" text-anchor="middle" fill="#6c9fff" font-size="10" font-weight="bold">PII Detector</text>
  <text x="430" y="153" text-anchor="middle" fill="#8b90a0" font-size="8">Combined, multi-lang</text>

  <!-- Arrow -->
  <line x1="280" y1="170" x2="280" y2="190" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#ar-d)"/>

  <!-- Classification Stage -->
  <rect x="120" y="192" width="320" height="40" rx="6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="280" y="210" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">Classify Sensitivity</text>
  <text x="280" y="225" text-anchor="middle" fill="#8b90a0" font-family="'Courier New', monospace" font-size="9">High (SSN, CC) | Medium (name+DOB, email) | Low (first name)</text>

  <!-- Arrow -->
  <line x1="280" y1="232" x2="280" y2="252" stroke="#8b90a0" stroke-width="1.2" marker-end="url(#ar-d)"/>

  <!-- Handling Stage - 4 options -->
  <rect x="30" y="254" width="500" height="60" rx="6" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="280" y="272" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">Handle by Sensitivity</text>

  <rect x="42" y="280" width="106" height="26" rx="3" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1"/>
  <text x="95" y="297" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="bold">Redact / Block</text>

  <rect x="158" y="280" width="106" height="26" rx="3" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="1"/>
  <text x="211" y="297" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Mask / Tokenize</text>

  <rect x="274" y="280" width="106" height="26" rx="3" fill="#4ade80" opacity="0.12" stroke="#4ade80" stroke-width="1"/>
  <text x="327" y="297" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">Allow / Monitor</text>

  <rect x="390" y="280" width="126" height="26" rx="3" fill="#6c9fff" opacity="0.12" stroke="#6c9fff" stroke-width="1"/>
  <text x="453" y="297" text-anchor="middle" fill="#6c9fff" font-size="9" font-weight="bold">Data Minimization</text>

  <!-- Logging annotation -->
  <rect x="80" y="328" width="400" height="24" rx="4" fill="#2a2d37" stroke="#8b90a0" stroke-width="0.8"/>
  <text x="280" y="344" text-anchor="middle" fill="#8b90a0" font-size="9">Logging: PII type + count (never raw values) → security pipeline | PII-free version → normal pipeline</text>
</svg>