<svg viewBox="0 0 780 260" width="780" height="260" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="ts-a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b90a0"/></marker>
</defs>
<g font-family="system-ui,sans-serif">

<!-- Title -->
<text x="390" y="18" fill="#e1e4eb" font-size="14" text-anchor="middle" font-weight="600">LLM Training Stages</text>

<!-- ═══ Stage 1: Pre-training ═══ -->
<text x="105" y="52" fill="#8b90a0" font-size="9" text-anchor="middle">Language, facts, code</text>
<rect x="25" y="62" width="160" height="48" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="105" y="82" fill="#6c9fff" font-size="11" text-anchor="middle" font-weight="600">Pre-training</text>
<text x="105" y="98" fill="#8b90a0" font-size="9" text-anchor="middle">Next-token prediction</text>

<text x="105" y="128" fill="#e1e4eb" font-size="10" text-anchor="middle" font-weight="600">Base Model</text>
<text x="105" y="142" fill="#8b90a0" font-size="9" text-anchor="middle">&quot;text completer&quot;</text>

<text x="105" y="170" fill="#f4a752" font-size="9" text-anchor="middle">Risk: memorized data,</text>
<text x="105" y="183" fill="#f4a752" font-size="9" text-anchor="middle">biases, outdated facts</text>

<!-- Arrow 1 to 2 -->
<line x1="185" y1="86" x2="208" y2="86" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#ts-a)"/>

<!-- ═══ Stage 2: Instruction Tuning ═══ -->
<text x="295" y="52" fill="#8b90a0" font-size="9" text-anchor="middle">Instruction following, roles</text>
<rect x="215" y="62" width="160" height="48" rx="5" fill="#1a1d27" stroke="#f4a752" stroke-width="1.5"/>
<text x="295" y="82" fill="#f4a752" font-size="11" text-anchor="middle" font-weight="600">Instruction Tuning</text>
<text x="295" y="98" fill="#8b90a0" font-size="9" text-anchor="middle">Fine-tune on conversations</text>

<text x="295" y="128" fill="#e1e4eb" font-size="10" text-anchor="middle" font-weight="600">Chat Model</text>
<text x="295" y="142" fill="#8b90a0" font-size="9" text-anchor="middle">&quot;follows instructions&quot;</text>

<text x="295" y="170" fill="#f4a752" font-size="9" text-anchor="middle">Risk: hierarchy is a</text>
<text x="295" y="183" fill="#f4a752" font-size="9" text-anchor="middle">soft preference, breakable</text>

<!-- Arrow 2 to 3 -->
<line x1="375" y1="86" x2="398" y2="86" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#ts-a)"/>

<!-- ═══ Stage 3: RLHF ═══ -->
<text x="485" y="52" fill="#8b90a0" font-size="9" text-anchor="middle">Safety, refusal, alignment</text>
<rect x="405" y="62" width="160" height="48" rx="5" fill="#1a1d27" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="485" y="82" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="600">RLHF / Alignment</text>
<text x="485" y="98" fill="#8b90a0" font-size="9" text-anchor="middle">Human preferences</text>

<text x="485" y="128" fill="#e1e4eb" font-size="10" text-anchor="middle" font-weight="600">Aligned Model</text>
<text x="485" y="142" fill="#8b90a0" font-size="9" text-anchor="middle">&quot;safe + helpful&quot;</text>

<text x="485" y="170" fill="#f4a752" font-size="9" text-anchor="middle">Risk: can be bypassed</text>
<text x="485" y="183" fill="#f4a752" font-size="9" text-anchor="middle">via jailbreaking</text>

<!-- Arrow 3 to 4 -->
<line x1="565" y1="86" x2="588" y2="86" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#ts-a)"/>

<!-- ═══ Stage 4: RL for Reasoning (optional) ═══ -->
<text x="675" y="52" fill="#8b90a0" font-size="9" text-anchor="middle">Step-by-step reasoning</text>
<rect x="595" y="62" width="160" height="48" rx="5" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="675" y="82" fill="#4ade80" font-size="11" text-anchor="middle" font-weight="600">RL for Reasoning</text>
<text x="675" y="98" fill="#8b90a0" font-size="9" text-anchor="middle">(optional stage)</text>

<text x="675" y="128" fill="#e1e4eb" font-size="10" text-anchor="middle" font-weight="600">Reasoning Model</text>
<text x="675" y="142" fill="#8b90a0" font-size="9" text-anchor="middle">&quot;thinks step-by-step&quot;</text>

<text x="675" y="170" fill="#f4a752" font-size="9" text-anchor="middle">Risk: policy violations</text>
<text x="675" y="183" fill="#f4a752" font-size="9" text-anchor="middle">hidden in thinking tokens</text>

<!-- Bottom annotation -->
<line x1="25" y1="210" x2="755" y2="210" stroke="#2a2e3a" stroke-width="1"/>
<text x="390" y="232" fill="#8b90a0" font-size="10" text-anchor="middle">Each stage builds on the previous. Each creates capabilities AND risks.</text>
<text x="390" y="248" fill="#8b90a0" font-size="10" text-anchor="middle">Guardrails exist because no amount of training eliminates the risks.</text>

</g>
</svg>
