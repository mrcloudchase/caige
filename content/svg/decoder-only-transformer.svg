<svg viewBox="0 0 520 620" width="520" height="620" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="dt-a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b90a0"/></marker></defs>
<g font-family="system-ui,sans-serif">
<!-- Title -->
<text x="200" y="20" fill="#e1e4eb" font-size="14" text-anchor="middle" font-weight="600">Decoder-Only Transformer</text>
<text x="200" y="36" fill="#8b90a0" font-size="10" text-anchor="middle">(used by GPT, Claude, Llama, Gemini)</text>
<!-- Input -->
<rect x="75" y="50" width="250" height="32" rx="4" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="200" y="71" fill="#e1e4eb" font-size="12" text-anchor="middle">Input Tokens</text>
<line x1="200" y1="82" x2="200" y2="100" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<!-- Embedding + Position -->
<rect x="50" y="106" width="300" height="32" rx="4" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="200" y="127" fill="#6c9fff" font-size="12" text-anchor="middle" font-weight="600">Token Embedding + Positional Encoding</text>
<text x="370" y="118" fill="#8b90a0" font-size="9">Convert tokens to vectors;</text>
<text x="370" y="130" fill="#8b90a0" font-size="9">add position information</text>
<line x1="200" y1="138" x2="200" y2="162" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<!-- Decoder block border -->
<rect x="30" y="168" width="340" height="268" rx="8" fill="none" stroke="#8b90a0" stroke-width="1" stroke-dasharray="6,4"/>
<text x="350" y="185" fill="#8b90a0" font-size="11" font-style="italic">Decoder Layer</text>
<text x="350" y="199" fill="#8b90a0" font-size="11" font-style="italic">(repeat 32-128x)</text>
<!-- Masked Self-Attention -->
<rect x="55" y="184" width="290" height="48" rx="5" fill="#1a1d27" stroke="#6c9fff" stroke-width="1.5"/>
<text x="200" y="205" fill="#6c9fff" font-size="13" text-anchor="middle" font-weight="600">Masked Self-Attention</text>
<text x="200" y="222" fill="#6c9fff" font-size="10" text-anchor="middle">(multi-head, causal mask)</text>
<text x="370" y="205" fill="#8b90a0" font-size="9">Each token attends only to</text>
<text x="370" y="217" fill="#8b90a0" font-size="9">itself and previous tokens</text>
<!-- Add & Norm 1 -->
<line x1="200" y1="232" x2="200" y2="258" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<text x="200" y="252" fill="#8b90a0" font-size="9" text-anchor="middle">Add & Normalize</text>
<!-- Feed-Forward -->
<rect x="55" y="264" width="290" height="48" rx="5" fill="#1a1d27" stroke="#2a2e3a" stroke-width="1.5"/>
<text x="200" y="285" fill="#e1e4eb" font-size="13" text-anchor="middle" font-weight="600">Feed-Forward Network</text>
<text x="200" y="302" fill="#8b90a0" font-size="10" text-anchor="middle">(applied to each token independently)</text>
<text x="370" y="285" fill="#8b90a0" font-size="9">Process each token's</text>
<text x="370" y="297" fill="#8b90a0" font-size="9">representation further</text>
<!-- Add & Norm 2 -->
<line x1="200" y1="312" x2="200" y2="338" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<text x="200" y="332" fill="#8b90a0" font-size="9" text-anchor="middle">Add & Normalize</text>
<!-- Residual connection arrows (left side) -->
<path d="M50,208 L40,208 L40,252 L55,252" fill="none" stroke="#6c9fff" stroke-width="0.8" opacity="0.5" marker-end="url(#dt-a)"/>
<path d="M50,288 L40,288 L40,332 L55,332" fill="none" stroke="#6c9fff" stroke-width="0.8" opacity="0.5" marker-end="url(#dt-a)"/>
<text x="22" y="232" fill="#6c9fff" font-size="7" text-anchor="middle" opacity="0.6">skip</text>
<text x="22" y="312" fill="#6c9fff" font-size="7" text-anchor="middle" opacity="0.6">skip</text>
<!-- Repeat notation -->
<text x="200" y="418" fill="#8b90a0" font-size="10" text-anchor="middle">&#x2191; repeated N times (one layer per repetition)</text>
<!-- Arrow out of block -->
<line x1="200" y1="436" x2="200" y2="456" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<!-- Output Linear Layer -->
<rect x="55" y="462" width="290" height="38" rx="5" fill="#1a1d27" stroke="#fbbf24" stroke-width="1.5"/>
<text x="200" y="486" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="600">Linear Layer (Unembedding)</text>
<text x="370" y="478" fill="#8b90a0" font-size="9">Project to vocabulary size</text>
<text x="370" y="490" fill="#8b90a0" font-size="9">(one score per token)</text>
<!-- Softmax -->
<line x1="200" y1="500" x2="200" y2="524" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<text x="200" y="538" fill="#8b90a0" font-size="12" text-anchor="middle">softmax</text>
<line x1="200" y1="544" x2="200" y2="566" stroke="#8b90a0" stroke-width="1.5" marker-end="url(#dt-a)"/>
<!-- Output -->
<rect x="50" y="572" width="300" height="36" rx="5" fill="#1a1d27" stroke="#4ade80" stroke-width="1.5"/>
<text x="200" y="595" fill="#4ade80" font-size="13" text-anchor="middle" font-weight="600">Next Token Probabilities</text>
<text x="370" y="590" fill="#8b90a0" font-size="9">One probability for every</text>
<text x="370" y="602" fill="#8b90a0" font-size="9">token in the vocabulary</text>
</g>
</svg>
